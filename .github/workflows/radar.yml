name: Drop Radar

on:
  schedule:
    - cron: '0 * * * *'      # every hour (UTC; GitHub may delay it a few minutes)
  workflow_dispatch:          # adds a manual "Run workflow" button for testing

permissions:
  contents: write             # lets the job commit state.json back to the repo

concurrency:
  group: drop-radar
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Scan and push
        env:
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node radar.js

      - name: Persist state
        run: |
          git config user.name "drop-radar"
          git config user.email "drop-radar@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || (git commit -m "update radar state [skip ci]" && git push)
